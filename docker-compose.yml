services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-owlreads}
      POSTGRES_USER: ${POSTGRES_USER:-owlreads}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-owlreads_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: core/Dockerfile
    env_file:
      - .env
    environment:
      CORESETTINGS_DEBUG: "False"
      CORESETTINGS_ALLOWED_HOSTS: ${CORESETTINGS_ALLOWED_HOSTS:-["localhost","127.0.0.1"]}
      CORESETTINGS_CORS_ALLOWED_ORIGINS: ${CORESETTINGS_CORS_ALLOWED_ORIGINS:-[]}
      CORESETTINGS_SECRET_KEY: ${CORESETTINGS_SECRET_KEY:-"CHANGE_ME"}
      CORESETTINGS_DATABASES: >
        {"default":{"ENGINE":"django.db.backends.postgresql","NAME":"${POSTGRES_DB:-owlreads}","USER":"${POSTGRES_USER:-owlreads}","PASSWORD":"${POSTGRES_PASSWORD:-owlreads_password}","HOST":"db","PORT":5432}}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_static:/app/staticfiles
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      # Use same-origin in production (Nginx proxies /api to backend)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      NODE_ENV: production
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_static:/static:ro

volumes:
  postgres_data:
  backend_static:

